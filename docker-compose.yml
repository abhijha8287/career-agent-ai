services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: jobhunter
      POSTGRES_PASSWORD: jobhunter
      POSTGRES_DB: jobhunter
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://jobhunter:jobhunter@postgres:5432/jobhunter
      REDIS_URL: redis://redis:6379/0
      ELASTICSEARCH_URL: http://elasticsearch:9200
      CORS_ORIGINS: '["http://localhost:3000"]'
      GREENHOUSE_BOARDS: '[]'
      LEVER_SITES: '[]'
      ASHBY_BOARDS: '[]'
      WORKABLE_ACCOUNTS: '[]'
      RECRUITEE_COMPANIES: '[]'
      PERSONIO_COMPANIES: '[]'
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - elasticsearch

  worker:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://jobhunter:jobhunter@postgres:5432/jobhunter
      REDIS_URL: redis://redis:6379/0
      GREENHOUSE_BOARDS: '[]'
      LEVER_SITES: '[]'
      ASHBY_BOARDS: '[]'
      WORKABLE_ACCOUNTS: '[]'
      RECRUITEE_COMPANIES: '[]'
      PERSONIO_COMPANIES: '[]'
    depends_on:
      - redis
      - backend

  beat:
    build: ./backend
    command: celery -A app.tasks.celery_app.celery_app beat --loglevel=INFO
    environment:
      DATABASE_URL: postgresql+psycopg://jobhunter:jobhunter@postgres:5432/jobhunter
      REDIS_URL: redis://redis:6379/0
      GREENHOUSE_BOARDS: '[]'
      LEVER_SITES: '[]'
      ASHBY_BOARDS: '[]'
      WORKABLE_ACCOUNTS: '[]'
      RECRUITEE_COMPANIES: '[]'
      PERSONIO_COMPANIES: '[]'
    depends_on:
      - redis
      - backend

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres-data:
