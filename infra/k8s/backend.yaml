apiVersion: apps/v1
kind: Deployment
metadata:
  name: jobhunter-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: jobhunter-backend
  template:
    metadata:
      labels:
        app: jobhunter-backend
    spec:
      containers:
        - name: api
          image: ghcr.io/your-org/jobhunter-backend:latest
          ports:
            - containerPort: 8000
          envFrom:
            - secretRef:
                name: jobhunter-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: jobhunter-backend
spec:
  selector:
    app: jobhunter-backend
  ports:
    - port: 8000
      targetPort: 8000
